apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb
  namespace: appwrite
spec:
  serviceName: mariadb
  replicas: 1
  selector:
    matchLabels:
      app: mariadb
  template:
    metadata:
      labels:
        app: mariadb
    spec:
      containers:
      - name: mariadb
        image: mariadb:10.11
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "rootpassword"
        - name: MYSQL_DATABASE
          value: "appwrite"
        - name: MYSQL_USER
          value: "appwrite"
        - name: MYSQL_PASSWORD
          value: "strongpassword123"
        volumeMounts:
        - name: mariadb-data
          mountPath: /var/lib/mysql
  volumeClaimTemplates:
  - metadata:
      name: mariadb-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mariadb
  namespace: appwrite
spec:
  selector:
    app: mariadb
  ports:
  - port: 3306
    targetPort: 3306
